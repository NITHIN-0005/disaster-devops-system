<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | DevOps Disaster Relief System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0b2b3b 0%, #1a4a5f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    /* animated background elements */
    .bg-pattern {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .bg-pattern::before {
      content: "⛑️";
      position: absolute;
      font-size: 300px;
      opacity: 0.03;
      bottom: -50px;
      right: -50px;
      transform: rotate(-15deg);
    }

    .bg-pattern::after {
      content: "🚑";
      position: absolute;
      font-size: 250px;
      opacity: 0.03;
      top: -80px;
      left: -80px;
      transform: rotate(10deg);
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 450px;
      margin: 20px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(10px);
      border-radius: 48px;
      padding: 48px 40px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.2);
      transition: transform 0.3s ease;
    }

    .login-card:hover {
      transform: translateY(-5px);
    }

    .logo-section {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      background: linear-gradient(135deg, #1f6e7c, #0b5565);
      width: 70px;
      height: 70px;
      border-radius: 25px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .logo-icon i {
      font-size: 36px;
      color: white;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #0b2b3b;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #5a7c8b;
      font-size: 14px;
      font-weight: 500;
    }

    .input-group {
      margin-bottom: 24px;
    }

    .input-label {
      display: block;
      font-weight: 600;
      font-size: 13px;
      color: #1a4a5f;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #8ba0ae;
      font-size: 16px;
    }

    input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      border: 2px solid #e2e8f0;
      border-radius: 30px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
      outline: none;
      background: white;
    }

    input:focus {
      border-color: #1f6e7c;
      box-shadow: 0 0 0 3px rgba(31, 110, 124, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1f6e7c, #0b5565);
      border: none;
      border-radius: 30px;
      color: white;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(31, 110, 124, 0.3);
    }

    .error-message {
      background: #fee2e2;
      color: #b91c1c;
      padding: 12px;
      border-radius: 20px;
      font-size: 13px;
      text-align: center;
      margin-top: 20px;
      display: none;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }

    .error-message.show {
      display: flex;
    }

    .credentials-hint {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #e2e8f0;
      text-align: center;
      font-size: 12px;
      color: #8ba0ae;
    }

    .credentials-hint strong {
      color: #1f6e7c;
      background: #e6f3f5;
      padding: 4px 8px;
      border-radius: 12px;
      font-family: monospace;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .shake {
      animation: shake 0.3s ease-in-out;
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="login-container">
    <div class="login-card">
      <div class="logo-section">
        <div class="logo-icon">
          <i class="fas fa-cloud-upload-alt"></i>
        </div>
        <h1>DevOps DRM</h1>
        <p class="subtitle">Disaster Relief · Microservices Platform</p>
      </div>

      <div class="input-group">
        <label class="input-label"><i class="fas fa-user"></i> Username</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope"></i>
          <input type="text" id="username" placeholder="admin / operator" autocomplete="off">
        </div>
      </div>

      <div class="input-group">
        <label class="input-label"><i class="fas fa-lock"></i> Password</label>
        <div class="input-wrapper">
          <i class="fas fa-key"></i>
          <input type="password" id="password" placeholder="••••••" onkeypress="handleKeyPress(event)">
        </div>
      </div>

      <button class="login-btn" onclick="validateLogin()">
        <i class="fas fa-arrow-right-to-bracket"></i> Secure Login
      </button>

      <div id="errorMsg" class="error-message">
        <i class="fas fa-exclamation-triangle"></i>
        <span>Invalid credentials. Access denied.</span>
      </div>

      <div class="credentials-hint">
        <i class="fas fa-info-circle"></i> Demo access: <strong>admin</strong> / <strong>1234</strong>
      </div>
    </div>
  </div>

  <script>
    function validateLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMsg');
      const loginCard = document.querySelector('.login-card');

      // Demo authentication
      if (username === 'admin' && password === '1234') {
        // Store session
        sessionStorage.setItem('isLoggedIn', 'true');
        sessionStorage.setItem('username', username);
        sessionStorage.setItem('loginTime', new Date().toISOString());
        // Redirect to main dashboard
        window.location.href = 'index.html';
      } else {
        // Show error with animation
        errorDiv.classList.add('show');
        loginCard.classList.add('shake');
        setTimeout(() => {
          loginCard.classList.remove('shake');
        }, 300);
        
        // Clear password field
        document.getElementById('password').value = '';
        
        // Auto-hide error after 3 seconds
        setTimeout(() => {
          errorDiv.classList.remove('show');
        }, 3000);
      }
    }

    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        validateLogin();
      }
    }

    // Redirect if already logged in
    if (sessionStorage.getItem('isLoggedIn') === 'true') {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
